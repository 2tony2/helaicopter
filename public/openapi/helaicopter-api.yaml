openapi: 3.1.0
info:
  title: Helaicopter API
  description: Local-machine backend for the Helaicopter dashboard.
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Health
      description: Minimal liveness probe.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Health Get
  /_ops/health:
    get:
      tags:
      - health
      summary: Ops Health
      description: Minimal liveness probe (no dependencies checked).
      operationId: ops_health__ops_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Ops Health  Ops Health Get
  /_ops/ready:
    get:
      tags:
      - health
      summary: Ops Ready
      description: "Readiness probe that verifies critical runtime dependencies are\
        \ reachable.\n\nReturns:\n    A dict with a boolean ``ready`` field indicating\
        \ overall readiness and a\n    ``checks`` mapping of individual dependency\
        \ names to their pass/fail status."
      operationId: ops_ready__ops_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Ops Ready  Ops Ready Get
  /_ops/info:
    get:
      tags:
      - health
      summary: Ops Info
      description: "Return build and runtime metadata for dashboards and debugging.\n\
        \nReturns:\n    A dict containing the API version string, Python version,\
        \ debug flag,\n    server uptime in seconds, and the resolved project root\
        \ path."
      operationId: ops_info__ops_info_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Ops Info  Ops Info Get
  /auth/credentials:
    get:
      tags:
      - auth
      summary: List all credentials (secrets redacted).
      operationId: credential_list_auth_credentials_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CredentialResponse'
                type: array
                title: Response Credential List Auth Credentials Get
    post:
      tags:
      - auth
      summary: Create a new auth credential.
      operationId: credential_create_auth_credentials_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCredentialRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/credentials/oauth/initiate:
    post:
      tags:
      - auth
      summary: Start a managed OAuth credential flow.
      operationId: credential_oauth_initiate_auth_credentials_oauth_initiate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthInitiateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthInitiateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/credentials/oauth/callback:
    get:
      tags:
      - auth
      summary: Complete a managed OAuth credential flow.
      operationId: credential_oauth_callback_auth_credentials_oauth_callback_get
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
          title: Code
      - name: state
        in: query
        required: true
        schema:
          type: string
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/credentials/{credential_id}:
    delete:
      tags:
      - auth
      summary: Revoke a credential.
      operationId: credential_revoke_auth_credentials__credential_id__delete
      parameters:
      - name: credential_id
        in: path
        required: true
        schema:
          type: string
          title: Credential Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Credential Revoke Auth Credentials  Credential Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/credentials/{credential_id}/record-cost:
    post:
      tags:
      - auth
      summary: Record cost against a credential.
      operationId: credential_record_cost_auth_credentials__credential_id__record_cost_post
      parameters:
      - name: credential_id
        in: path
        required: true
        schema:
          type: string
          title: Credential Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordCostRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Credential Record Cost Auth Credentials  Credential
                  Id  Record Cost Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/credentials/{credential_id}/refresh:
    post:
      tags:
      - auth
      summary: Refresh a managed OAuth credential.
      operationId: credential_refresh_auth_credentials__credential_id__refresh_post
      parameters:
      - name: credential_id
        in: path
        required: true
        schema:
          type: string
          title: Credential Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /analytics:
    get:
      tags:
      - analytics
      summary: Analytics Index
      description: "Return aggregated analytics for persisted conversations.\n\nArgs:\n\
        \    params: Query parameters controlling the analytics window. Supports\n\
        \        ``days`` to restrict to a trailing number of days, and ``provider``\n\
        \        to filter by a specific AI provider (e.g. ``\"claude\"``,\n     \
        \   ``\"codex\"``, or ``\"all\"``).\n\nReturns:\n    Aggregated analytics\
        \ payload including token counts, estimated costs,\n    model and tool breakdowns,\
        \ daily usage time series, and spend rates."
      operationId: analytics_index_analytics_get
      parameters:
      - name: days
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          description: Restrict analytics to the trailing number of days.
          title: Days
        description: Restrict analytics to the trailing number of days.
      - name: provider
        in: query
        required: false
        schema:
          anyOf:
          - enum:
            - all
            - claude
            - codex
            - openclaw
            type: string
          - type: 'null'
          description: Optional provider filter. Use `all` or omit for combined analytics
            across Claude, Codex, and OpenClaw.
          title: Provider
        description: Optional provider filter. Use `all` or omit for combined analytics
          across Claude, Codex, and OpenClaw.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsDataResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /conversation-dags:
    get:
      tags:
      - conversation-dags
      summary: Conversation Dags Index
      description: "List main conversations with backend-built DAG stats.\n\nArgs:\n\
        \    params: Query parameters controlling the listing. Supports ``project``\n\
        \        (encoded project path) to filter to a single project, ``days`` to\n\
        \        restrict to a trailing number of days, and ``provider`` to filter\n\
        \        by AI provider (e.g. ``\"claude\"``, ``\"codex\"``, or ``\"all\"\
        ``).\n\nReturns:\n    List of conversation summary objects enriched with DAG\
        \ statistics\n    (node count, edge count, max depth, subagent counts, etc.),\
        \ ordered\n    by recency."
      operationId: conversation_dags_index_conversation_dags_get
      parameters:
      - name: project
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            description: Opaque encoded project key used in URLs and persisted records.
          - type: 'null'
          description: Optional encoded project path filter.
          title: Project
        description: Optional encoded project path filter.
      - name: days
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          description: Restrict summaries to the trailing number of days.
          title: Days
        description: Restrict summaries to the trailing number of days.
      - name: provider
        in: query
        required: false
        schema:
          anyOf:
          - enum:
            - all
            - claude
            - codex
            - openclaw
            type: string
          - type: 'null'
          description: Optional provider filter. Use `all` or omit for combined DAGs
            across Claude, Codex, and OpenClaw.
          title: Provider
        description: Optional provider filter. Use `all` or omit for combined DAGs
          across Claude, Codex, and OpenClaw.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationDagSummaryResponse'
                title: Response Conversation Dags Index Conversation Dags Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /conversations:
    get:
      tags:
      - conversations
      summary: Conversations Index
      description: "List merged Claude and Codex conversation summaries.\n\nArgs:\n\
        \    params: Query parameters for filtering results. Supports ``project``\n\
        \        (encoded project path) to scope results to a single project, and\n\
        \        ``days`` to restrict to the trailing number of days.\n\nReturns:\n\
        \    List of conversation summary objects ordered by recency, combining\n\
        \    Claude and Codex sessions with token usage and metadata."
      operationId: conversations_index_conversations_get
      parameters:
      - name: project
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            description: Opaque encoded project key used in URLs and persisted records.
          - type: 'null'
          description: Optional encoded project path filter.
          title: Project
        description: Optional encoded project path filter.
      - name: days
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          description: Restrict summaries to the trailing number of days.
          title: Days
        description: Restrict summaries to the trailing number of days.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationSummaryResponse'
                title: Response Conversations Index Conversations Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /conversations/by-ref/{conversation_ref}:
    get:
      tags:
      - conversations
      summary: Conversation By Ref
      description: "Resolve a stable conversation ref to the current canonical route\
        \ target.\n\nArgs:\n    conversation_ref: Stable identifier for the conversation,\
        \ independent\n        of project path or session routing changes.\n\nReturns:\n\
        \    Resolution payload containing the canonical ``route_slug``,\n    ``project_path``,\
        \ ``session_id``, and ``thread_type`` for the\n    conversation.\n\nRaises:\n\
        \    HTTPException: 404 if no conversation matches the given ref."
      operationId: conversation_by_ref_conversations_by_ref__conversation_ref__get
      parameters:
      - name: conversation_ref
        in: path
        required: true
        schema:
          type: string
          title: Conversation Ref
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationRefResolutionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /conversations/{project_path}/{session_id}:
    get:
      tags:
      - conversations
      summary: Conversations Detail
      description: "Return one conversation detail from persisted or live data.\n\n\
        Args:\n    project_path: Encoded project key identifying the project the\n\
        \        conversation belongs to.\n    session_id: Unique session identifier\
        \ for the conversation.\n    parent_session_id: Optional session ID of the\
        \ parent conversation when\n        accessing a subagent thread directly.\n\
        \nReturns:\n    Full conversation detail including all messages, tool calls,\
        \ plans,\n    subagent references, token usage, and context analytics.\n\n\
        Raises:\n    HTTPException: 404 if the conversation cannot be found."
      operationId: conversations_detail_conversations__project_path___session_id__get
      parameters:
      - name: project_path
        in: path
        required: true
        schema:
          type: string
          title: Project Path
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: parent_session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /conversations/{project_path}/{session_id}/dag:
    get:
      tags:
      - conversations
      summary: Conversations Dag Detail
      description: "Return one backend-built conversation DAG.\n\nArgs:\n    project_path:\
        \ Encoded project key for the conversation.\n    session_id: Session identifier\
        \ of the root conversation whose agent\n        tree should be returned.\n\
        \    parent_session_id: Optional parent session ID when the root is itself\n\
        \        a subagent thread.\n\nReturns:\n    DAG payload containing nodes\
        \ (one per agent/subagent transcript),\n    directed edges, and aggregate\
        \ graph statistics such as depth and\n    total token counts.\n\nRaises:\n\
        \    HTTPException: 404 if no DAG is found for the given session."
      operationId: conversations_dag_detail_conversations__project_path___session_id__dag_get
      parameters:
      - name: project_path
        in: path
        required: true
        schema:
          type: string
          title: Project Path
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: parent_session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDagResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /conversations/{project_path}/{session_id}/subagents/{agent_id}:
    get:
      tags:
      - conversations
      summary: Conversations Subagent Detail
      description: "Return one subagent transcript beneath its parent conversation\
        \ route.\n\nArgs:\n    project_path: Encoded project key for the parent conversation.\n\
        \    session_id: Session ID of the parent (root) conversation that spawned\n\
        \        the subagent.\n    agent_id: Identifier of the specific subagent\
        \ whose transcript should\n        be returned.\n\nReturns:\n    Full conversation\
        \ detail for the subagent, scoped to its transcript\n    with messages, usage,\
        \ and context analytics.\n\nRaises:\n    HTTPException: 404 if the subagent\
        \ conversation cannot be found."
      operationId: conversations_subagent_detail_conversations__project_path___session_id__subagents__agent_id__get
      parameters:
      - name: project_path
        in: path
        required: true
        schema:
          type: string
          title: Project Path
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /databases/status:
    get:
      tags:
      - databases
      summary: Database Status
      description: "Return database artifact status, bootstrapping refresh on first\
        \ access.\n\nReturns:\n    Status payload containing the current refresh state,\
        \ timing metadata,\n    runtime read-backend configuration, and per-artifact\
        \ health details\n    for SQLite, DuckDB, and the frontend cache.\n\nRaises:\n\
        \    HTTPException: 500 if a database operation error occurs without a\n \
        \       structured payload."
      operationId: database_status_databases_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseStatusResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseStatusResponse'
  /databases/refresh:
    post:
      tags:
      - databases
      summary: Database Refresh
      description: "Trigger a database refresh and invalidate backend read caches.\n\
        \nArgs:\n    body: Refresh control options. ``force`` bypasses the staleness\
        \ check\n        and triggers an immediate rebuild; ``trigger`` is a label\
        \ recorded\n        in the refresh log (defaults to ``\"manual\"``);\n   \
        \     ``stale_after_seconds`` sets the minimum age in seconds before a\n \
        \       refresh is considered necessary (defaults to 6 hours).\n\nReturns:\n\
        \    Updated database status payload reflecting the new refresh state,\n \
        \   including timing metadata and artifact health after the operation.\n\n\
        Raises:\n    HTTPException: 500 if a database operation error occurs without\
        \ a\n        structured payload."
      operationId: database_refresh_databases_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseRefreshRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseStatusResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /conversations/{project_path}/{session_id}/evaluations:
    get:
      tags:
      - evaluations
      summary: Conversation Evaluations Index
      description: "List persisted evaluation jobs for a specific conversation.\n\n\
        Args:\n    project_path: Path identifying the project that owns the conversation.\n\
        \    session_id: Unique identifier of the conversation session.\n    parent_session_id:\
        \ Optional parent session ID to scope the lookup to a\n        sub-conversation.\
        \ Defaults to None.\n\nReturns:\n    A list of evaluation job records associated\
        \ with the conversation,\n    ordered by creation time."
      operationId: conversation_evaluations_index_conversations__project_path___session_id__evaluations_get
      parameters:
      - name: project_path
        in: path
        required: true
        schema:
          type: string
          title: Project Path
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: parent_session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationEvaluationResponse'
                title: Response Conversation Evaluations Index Conversations  Project
                  Path   Session Id  Evaluations Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - evaluations
      summary: Conversation Evaluations Create
      description: "Create and enqueue a backend-owned evaluation job for a conversation.\n\
        \nArgs:\n    project_path: Path identifying the project that owns the conversation.\n\
        \    session_id: Unique identifier of the conversation session to evaluate.\n\
        \    body: Evaluation job creation request containing the evaluation prompt\n\
        \        reference and any additional configuration.\n    parent_session_id:\
        \ Optional parent session ID to scope the evaluation\n        to a sub-conversation.\
        \ Defaults to None.\n\nReturns:\n    The newly created evaluation job record\
        \ in an accepted (pending) state."
      operationId: conversation_evaluations_create_conversations__project_path___session_id__evaluations_post
      parameters:
      - name: project_path
        in: path
        required: true
        schema:
          type: string
          title: Project Path
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: parent_session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationEvaluationCreateRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationEvaluationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /evaluation-prompts:
    get:
      tags:
      - evaluations
      summary: Evaluation Prompts Index
      description: "List saved evaluation prompts with the built-in default first.\n\
        \nReturns:\n    Ordered list of evaluation prompt templates. The built-in\
        \ default\n    prompt appears first, followed by user-managed prompts sorted\
        \ by\n    creation time."
      operationId: evaluation_prompts_index_evaluation_prompts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/EvaluationPromptResponse'
                type: array
                title: Response Evaluation Prompts Index Evaluation Prompts Get
    post:
      tags:
      - evaluations
      summary: Evaluation Prompts Create
      description: "Create a new user-managed evaluation prompt.\n\nArgs:\n    body:\
        \ Prompt creation payload containing ``name``, ``prompt_text``\n        (both\
        \ required and non-blank), and an optional ``description``.\n\nReturns:\n\
        \    The newly created evaluation prompt with its assigned ``prompt_id``\n\
        \    and timestamps.\n\nRaises:\n    HTTPException: 400 if the payload fails\
        \ validation (e.g. blank fields).\n    HTTPException: 503 if the backing storage\
        \ is unavailable."
      operationId: evaluation_prompts_create_evaluation_prompts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationPromptCreateRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationPromptResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /evaluation-prompts/{prompt_id}:
    delete:
      tags:
      - evaluations
      summary: Evaluation Prompts Delete
      description: "Delete one stored user-managed evaluation prompt.\n\nArgs:\n \
        \   prompt_id: Unique identifier of the prompt to delete. Built-in default\n\
        \        prompts cannot be deleted.\n\nReturns:\n    Empty 204 No Content\
        \ response on success.\n\nRaises:\n    HTTPException: 400 if the prompt ID\
        \ refers to a protected built-in\n        prompt.\n    HTTPException: 404\
        \ if no prompt with the given ID exists."
      operationId: evaluation_prompts_delete_evaluation_prompts__prompt_id__delete
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema:
          type: string
          title: Prompt Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - evaluations
      summary: Evaluation Prompts Update
      description: "Update one stored evaluation prompt.\n\nArgs:\n    prompt_id:\
        \ Unique identifier of the prompt to update.\n    body: Update payload containing\
        \ the revised ``name``, ``prompt_text``,\n        and optional ``description``.\
        \ All write fields are validated as\n        non-blank.\n\nReturns:\n    The\
        \ updated evaluation prompt reflecting the new field values and an\n    updated\
        \ ``updated_at`` timestamp.\n\nRaises:\n    HTTPException: 400 if the payload\
        \ fails validation.\n    HTTPException: 404 if no prompt with the given ID\
        \ exists.\n    HTTPException: 503 if the backing storage is unavailable."
      operationId: evaluation_prompts_update_evaluation_prompts__prompt_id__patch
      parameters:
      - name: prompt_id
        in: path
        required: true
        schema:
          type: string
          title: Prompt Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationPromptUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationPromptResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /gateway/direction:
    get:
      tags:
      - gateway
      summary: Describe the primary backend gateway direction across platform surfaces.
      description: "Return the primary backend gateway direction across platform surfaces.\n\
        \nReturns:\n    Gateway direction metadata describing which backend surfaces\
        \ are active\n    and how requests should be routed across them."
      operationId: gateway_direction_gateway_direction_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayDirectionResponse'
  /history:
    get:
      tags:
      - history
      summary: History Index
      description: "Return combined CLI command history from Claude and Codex sources.\n\
        \nArgs:\n    params: Query parameters controlling the history lookup, including\n\
        \        an optional ``limit`` on the number of entries returned.\n\nReturns:\n\
        \    A list of history entries merged from Claude and Codex CLI sources,\n\
        \    ordered from most recent to oldest, up to the requested limit."
      operationId: history_index_history_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Maximum number of history entries to return.
          default: 100
          title: Limit
        description: Maximum number of history entries to return.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryEntryResponse'
                title: Response History Index History Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /plans:
    get:
      tags:
      - plans
      summary: Plans Index
      description: "List saved plans from Claude and Codex sources.\n\nReturns:\n\
        \    A list of plan summaries aggregated from all configured plan sources."
      operationId: plans_index_plans_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PlanSummaryResponse'
                type: array
                title: Response Plans Index Plans Get
  /plans/{slug}:
    get:
      tags:
      - plans
      summary: Plans Detail
      description: "Return one plan by encoded id or legacy Claude slug.\n\nArgs:\n\
        \    slug: The encoded plan id or legacy Claude slug identifying the plan.\n\
        \nReturns:\n    Full plan detail including content and metadata.\n\nRaises:\n\
        \    HTTPException: 404 if no plan matching the given slug is found."
      operationId: plans_detail_plans__slug__get
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /projects:
    get:
      tags:
      - projects
      summary: Projects Index
      description: "List projects aggregated from conversation summaries.\n\nReturns:\n\
        \    A list of projects derived from stored conversation data."
      operationId: projects_index_projects_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ProjectResponse'
                type: array
                title: Response Projects Index Projects Get
  /subagents/{project_path}/{session_id}/{agent_id}:
    get:
      tags:
      - conversations
      summary: Subagents Detail
      description: "Return one subagent transcript for the conversation viewer.\n\n\
        Args:\n    project_path: URL-encoded path of the project the conversation\
        \ belongs to.\n    session_id: ID of the parent session that spawned the subagent.\n\
        \    agent_id: ID of the subagent whose conversation transcript is requested.\n\
        \nReturns:\n    Full conversation detail including messages and metadata for\
        \ the subagent.\n\nRaises:\n    HTTPException: 404 if no matching subagent\
        \ conversation is found."
      operationId: subagents_detail_subagents__project_path___session_id___agent_id__get
      parameters:
      - name: project_path
        in: path
        required: true
        schema:
          type: string
          title: Project Path
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /subscription-settings:
    get:
      tags:
      - subscriptions
      summary: Subscriptions Index
      description: "Return the current provider subscription settings.\n\nReturns:\n\
        \    The active subscription settings including configured provider options."
      operationId: subscriptions_index_subscription_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSettingsResponse'
    patch:
      tags:
      - subscriptions
      summary: Subscriptions Update
      description: "Persist provider subscription settings and return the merged result.\n\
        \nArgs:\n    body: Partial or full subscription settings to apply. Unset fields\
        \ are\n        merged with the existing configuration rather than overwritten.\n\
        \nReturns:\n    The updated subscription settings after the patch has been\
        \ applied."
      operationId: subscriptions_update_subscription_settings_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionSettingsUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSettingsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tasks/{session_id}:
    get:
      tags:
      - tasks
      summary: Tasks Detail
      description: "Return tasks associated with a session.\n\nArgs:\n    session_id:\
        \ The session ID whose tasks should be retrieved.\n    parent_session_id:\
        \ Optional parent session ID used to scope the lookup\n        when the session\
        \ belongs to a subagent conversation.\n\nReturns:\n    A task list response\
        \ containing all tasks found for the given session."
      operationId: tasks_detail_tasks__session_id__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      - name: parent_session_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
